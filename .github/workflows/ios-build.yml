name: iOS Build

on:
  push:
    branches: [main, 'v2/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme WawaRideApp -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Build
        run: |
          xcodebuild build \
            -scheme WawaRideApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Test WawaMesh
        run: |
          swift test --filter WawaMeshTests
