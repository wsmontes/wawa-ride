name: WAWARide
options:
  bundleIdPrefix: com.wawaride
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Sources/Resources/Info.plist
    DEVELOPMENT_ASSET_PATHS: ""

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "134.0.0"

targets:
  WAWARide:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wawaride.app
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: WebRTC
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint --quiet
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Copy .env to Bundle"
        script: |
          if [ -f "${SRCROOT}/../.env" ]; then
            cp "${SRCROOT}/../.env" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/.env"
          fi
        basedOnDependencyAnalysis: false
