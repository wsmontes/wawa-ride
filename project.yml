name: WAWARide
options:
  bundleIdPrefix: com.wawaride
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Sources/WawaRideApp/Resources/Info.plist

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.27.0"
  Ferrostar:
    url: https://github.com/stadiamaps/ferrostar
    from: "0.51.0"
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    from: "0.21.1"

targets:
  WAWARide:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Sources/WawaRideApp/Resources/Assets.xcassets
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wawaride.app
        INFOPLIST_FILE: Sources/WawaRideApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WawaRideApp/Resources/WawaRide.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 955573A4YH
    dependencies:
      - package: MapLibre
      - package: Ferrostar
        product: FerrostarCore
      - package: Ferrostar
        product: FerrostarSwiftUI
      - package: Ferrostar
        product: FerrostarMapLibreUI
      - package: secp256k1
