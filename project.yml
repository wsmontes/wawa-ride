name: WAWARide
options:
  bundleIdPrefix: com.wawaride
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  MapCache:
    url: https://github.com/merlos/MapCache
    from: "0.10.0"

targets:
  WAWARide:
    type: application
    platform: iOS
    sources:
      - path: Sources/BitLogger
      - path: Sources/BitFoundation
      - path: Sources/WawaOntology
        excludes:
          - "Types/RideEvent.swift"
          - "Types/Profile.swift"
          - "Types/Route.swift"
          - "Types/Collection.swift"
      - path: Sources/WawaMesh
        excludes:
          - "Multipeer/MultipeerTransport.swift"
          - "Transport.swift"
      - path: Sources/WawaMap
        excludes:
          - "RouteCorridor.swift"
          - "RideMapView.swift"
      - path: Sources/WawaRideApp
        excludes:
          - "ViewModels/RideSession.swift"
          - "Views/RootView.swift"
    resources:
      - path: Sources/WawaRideApp/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wawaride.app
        INFOPLIST_FILE: Sources/WawaRideApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WawaRideApp/Resources/WawaRide.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 955573A4YH
    dependencies:
      - package: MapCache
        product: MapCache
