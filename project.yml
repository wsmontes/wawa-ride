name: WAWARide
options:
  bundleIdPrefix: com.wawa.ride
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0

targets:
  WAWARide:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa.ride
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: 1
        UIBackgroundModes:
          - location
          - bluetooth-central
          - bluetooth-peripheral
          - audio
    dependencies:
      - package: GRDB
        product: GRDB
    preBuildScripts:
      - name: "Compile Opus"
        script: |
          # libopus will be compiled from Sources/Services/Audio/opus/
          # For initial builds, we use a pre-built XCFramework or
          # compile on-the-fly. Skip if already compiled.
          if [ ! -f "${BUILT_PRODUCTS_DIR}/libopus.a" ]; then
            echo "Opus needs to be compiled. Run ./scripts/build_opus.sh first."
          fi
    entitlements:
      path: Sources/Resources/WAWARide.entitlements
